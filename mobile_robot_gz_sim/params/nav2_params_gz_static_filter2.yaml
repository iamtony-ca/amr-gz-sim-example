global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0 #1.0
      publish_frequency: 2.0 #1.0
      tranform_tolerance: 0.5 #0.3
      global_frame: map
      robot_base_frame: base_link
      ### need to check
      footprint: "[[0.32, 0.315], [0.32, -0.315], [-0.315, -0.315], [-0.315, 0.315]]" #"[[0.31, 0.3], [0.31, -0.3], [-0.3, -0.3], [-0.3, 0.3]]" #"[[0.44, 0.3], [0.44, -0.3], [-0.3, -0.3], [-0.3, 0.3]]" 
      footprint_padding: 0.02 #0.05 #0.05 # 0.05
      # inscribed_radius: 0.29  # inner
      # circumscribed_radius: 0.55 #0.55  #outer
      # robot_radius: 0.22
      rolling_window: false #true #false
      width: 100 #50 # [m]
      height: 50
      resolution: 0.03 #0.03 #0.05 testing...
      track_unknown_space: false #true       # If false, treats unknown space as free space, else as unknown space.
      always_send_full_costmap: True

      plugins: ['static_layer', 'lane_filter', 'nvblox_layer', 'zed_front_object', 'zed_front_layer', 'zed_rear_layer', 'zed_right_layer', 'zed_left_layer', 'denoise_layer', 'obstacle_layer', 'stvl_layer', 'agent_layer', 'inflation_layer']
      # plugins: ['static_layer', 'obstacle_layer', 'inflation_layer']

      lane_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/costmap_filter_info" # 3단계에서 설정한 토픽과 일치
        tranform_tolerance: 0.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: True
        cost_scaling_factor: 10.0
        inflation_radius: 0.8 #0.45


      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        voxel_decay: 0.5 #5.
        decay_model: 0
        voxel_size: 0.05
        track_unknown_space: true
        unknown_threshold: 15
        mark_threshold: 0
        update_footprint_enabled: true
        combination_method: 1
        origin_z: 0.0
        publish_voxel_map: true
        transform_tolerance: 0.2
        mapping_mode: false
        map_save_duration: 60.0
        observation_sources: scan_front_zed
        scan_front_zed:
          data_type: LaserScan #PointCloud2
          topic: /scan_front_filtered_distance
          marking: true
          clearing: true
          obstacle_range: 3.0
          min_obstacle_height: 0.0
          max_obstacle_height: 2.0
          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: true
          filter: "voxel"
          voxel_min_points: 0
          clear_after_reading: true
          max_z: 7.0
          min_z: 0.1
          vertical_fov_angle: 0.8745
          horizontal_fov_angle: 1.048
          decay_acceleration: 15.0
          model_type: 0


      nvblox_layer:
        plugin: "nvblox::nav2::NvbloxCostmapLayer"
        enabled: false
        nav2_costmap_global_frame: map # must match with global_frame of global_costmap
        nvblox_map_slice_topic: "/nvblox_node/static_map_slice"
        convert_to_binary_costmap: true  # convert to map with only 0,1
        max_obstacle_distance: 0.5 #1.0    # [m] cost 가 0이 되는 max 지점.해당 값 부터는 free_space 로 처리됨.
        inflation_distance: 0.34 #0.5       # [m] 해당 영역 내부는 inscribed_inflated_obstacle(cost 253) 으로 처리?
        max_cost_value: 50 #252           # inflation_distance 경계지점의 cost 값.


      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: true
        minimal_group_size: 5 #2
        group_connectivity_type: 8


      zed_front_object:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan_obj1
        footprint_clearing_enabled: false #true

        scan_obj1:
          # sensor_frame: base_link # testing...
          topic: /scan_zed_objects_front #/scan_matched_points2 #/scan //output/points_stamped
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan" # "PointCloud2" # "LaserScan"
          ### need to check
          raytrace_max_range: 3.5 #3.0 # 보다 큰 값을 clearing (지움)
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0 #2.5 # (fake data)를 장애물로 인식 안함.
          obstacle_min_range: 0.0
          inf_is_valid: True         
 

      zed_front_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan_depth1
        footprint_clearing_enabled: true # false #true

        scan_depth1:
          # sensor_frame: base_link # testing...
          topic: /scan_front_filtered_distance #/scan_matched_points2 #/scan //output/points_stamped
          max_obstacle_height: 1.8
          clearing: True
          marking: True
          data_type: "LaserScan" # "PointCloud2" # "LaserScan"
          ### need to check
          raytrace_max_range: 2.5 #4.0 #2.3 #3.0 # 보다 큰 값을 clearing (지움)
          raytrace_min_range: 0.0
          obstacle_max_range: 2.0 #3.5 #1.8 #2.5 # (fake data)를 장애물로 인식 안함.
          obstacle_min_range: 0.0
          inf_is_valid: True         
 

      zed_rear_layer:
