  ros__parameters:
    smoothing_frequency: 20.0
    enable_stamped_cmd_vel: false
    scale_velocities: False
    feedback: "OPEN_LOOP" #"CLOSED_LOOP"
    max_velocity: [1.0, 0.0, 2.0]   # Maximum velocities (m/s) in [x, y, theta] axes or [x, y, z, roll, pitch, yaw] for full 6-DoF support.
    min_velocity: [-0.6, 0.0, -1.0]
    max_accel: [2.5, 0.0, 3.2] #[0.075, 0.0, 0.4] #[0.08, 0.0, 0.25] #[0.1, 0.0, 0.3] #[0.1, 0.0, 0.4] #[0.25, 0.0, 1.0] #[0.25, 0.0, 0.9] #[0.25, 0.0, 0.33] #[0.3, 0.0, 0.4] #[0.6125, 0.0, 0.8] #[2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2] #[-2.0, 0.0, -3.2] # [-3.2, 0.0, -3.2] #[-2.5, 0.0, -0.9]  #[-1.25, 0.0, -1.6] #[-2.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    bond_heartbeat_period: 0.1



