controller_server:
  ros__parameters:
    # use_sim_time: False
    # verbose: False                ## added   
    cmd_vel_topic: /cmd_vel       ## added     
    controller_frequency: 20.0 # 25.0 # MPPI 10.0 #lmr 25.0    # original: 20.0 , model_dt 와 동시 변경 필요.
    costmap_update_timeout: 0.30
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001    # 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 7.0 #20.0 #15.0 #1.2 #0.1     # 0.3    # Controller patience exceeded 뜨게 하는 tolerance sec. 해당 tolerance sec 도달 시 replanning 진행. 
    progress_checker_plugins: ["progress_checker", "progress_checker_recovery", "test_checker_recovery"]
    goal_checker_plugins: ["precise_goal_checker", "relaxed_goal_checker", "super_relaxed_goal_checker", "precise_simple_goal_checker"] # "precise_goal_checker"  general_goal_checker
    controller_plugins: ["FollowPath", "RecoveryFollowPath1", "RotationGraceful", "ReverseRPP", "StraightRPP"]
    use_realtime_priority: false


    precise_goal_checker:
      plugin: "nav2_controller::StableStoppedGoalChecker"
      x_goal_tolerance: 0.045       # 5cm X축 허용 오차
      y_goal_tolerance: 0.045       # 5cm Y축 허용 오차
      yaw_goal_tolerance: 0.04      # 약 5.7도 회전 허용 오차
      trans_stopped_velocity: 0.0 # 1cm/s 이하일 때 정지 간주
      rot_stopped_velocity: 0.0   # 0.01rad/s 이하일 때 정지 간주
      xy_stability_duration: 0.01      # 위 조건을 1초 이상 만족해야 함 0.01 로 바꿔줄까?
      yaw_stability_duration: 0.5     # 위 조건을 1초 이상 만족해야 함
      stateful: true
      # path_topic: "/plan"              # Planner가 발행하는 Global Path 토픽
      # path_tolerance_multiplier: 1.5   # 허용 오차의 1.5배 이내로 경로가 남았을 때만 도착 인정


    # Progress checker parameters
    progress_checker:
      plugin: "amr_controller::ProgressPublisherChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 25.0   # 10.0

    progress_checker_recovery:
      # plugin: "nav2_controller::SimpleProgressChecker"
      plugin: "amr_controller::ProgressPublisherChecker"
      required_movement_radius: 0.2
      movement_time_allowance: 15.0  # 10.0

    test_checker_recovery:
      plugin: "nav2_controller::SimpleProgressChecker"
      # plugin: "amr_controller::ProgressPublisherChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 10.0   # 10.0

    # # # # Goal checker parameters
    precise_simple_goal_checker:
     plugin: "nav2_controller::SimpleGoalChecker"
    #  plugin: "nav2_controller::PositionGoalChecker"
    #  plugin: "nav2_controller::StoppedGoalChecker"
    #  trans_stopped_velocity: 0.0
    #  rot_stopped_velocity: 0.006

     xy_goal_tolerance: 0.05 #0.05 # ros2 0.2    # lmr 0.03 # amr 0.08
     yaw_goal_tolerance: 0.04 #0.05 #0.07   # lmr 0.005   # amr 0.087
     stateful: true # testing..when hybriid astar, it is needed 
    
    relaxed_goal_checker:
     plugin: "nav2_controller::SimpleGoalChecker"
     xy_goal_tolerance: 0.05
     yaw_goal_tolerance: 0.8 #3.14
     stateful: false

    # for a star of recovery mode
    super_relaxed_goal_checker:
     plugin: "nav2_controller::SimpleGoalChecker"
     xy_goal_tolerance: 0.10
     yaw_goal_tolerance: 0.8 #3.14
     stateful: false


    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25




    # Graceful Controller Parameters
    FollowPath:

      plugin: "advanced_graceful_controller::GracefulController"

      # 속도 관련 (Velocity)
      v_linear_max: 0.71 #0.91 #0.82                  # RPP의 desired_linear_vel 값 
      v_linear_min: 0.01 #0.02               #
      v_angular_max: 1.8 #1.2 #1.5                # default 1.0

      # '시선' 관련 (Lookahead)
      min_lookahead: 0.45 #0.6 #0.4 #0.45 #0.55 #0.65 # 0.6               # RPP의 min_lookahead_dist 값 
      max_lookahead: 1.05 #1.15 #1.2 #1.3 #1.2                # RPP의 max_lookahead_dist 값 

      # 핵심 제어 법칙 (Core Control Law)
      k_phi: 1.0 #1.4 #1.3 #1.2 # 1.0 # 1.2 # 1.0 #2.0                        # 위치와 방향의 균형을 맞추는 값, waypoint/pose follow할지 trade-off, 낮으면 waypoint following. / 테스트 해보면, 값이 크면 곡선에서 global path arc 보다 크게 돔.
      k_delta: 1.5 #1.0 #1.2 #1.5 #0.8 #0.7 #0.8 #1.0                       # 조향 민감도에 대한 default 1.0, local_plan(파랑 경로) 벗어났을때 얼마나 빠르게 경로로 복귀하려고 하는지 정도. / 테스트 결과, 값이 크면, 곡선을 훨씬 잘 따라감. 하지만, 직진 코스에서 약간 wabble 거림.

      # 곡선 주행 (Curve Handling) - RPP의 regulated_linear_velocity_scaling 대체
      beta: 0.75 #0.3 #1.0 #0.8 #0.75 #0.55 #0.25 #0.2 #default 0.4                         # 곡선에서 속도를 줄이는 민감도 / 테스트결과: 곡선구간에서 순간적인 감속+저속주행
      lambda: 1.5 #1.2 #1.0 #1.5 #2.0 #1.15 #1.2 #1.7 # 1.6 #1.7 #default 2.0                       # 곡선을 얼마나 날카롭게 돌지 결정. 값이 작으면 global path보다 더 큰 호를 그림. / 테스트 결과, 값이 작으면, 곡선에서 더 빠르게 돌려고 함.+ global path보다 더 큰 호를 그림. 값이 크면, 곡선에서 더 느리게 돌려고함 + 직진성이 더 좋아진 느낌(?)

      # 목표 지점 동작 (Goal Behavior)
      slowdown_radius: 1.2 #1.0                  # RPP의 approach_velocity_scaling_dist 값 유지
      initial_rotation: false #true            # RPP의 use_rotate_to_heading 설정 유지
      initial_rotation_tolerance: 1.5 #1.5   # RPP의 rotate_to_heading_min_angle 값 유지
      prefer_final_rotation: false #false #true       # 최종 목표 지점에서 부드러운 정렬을 위해 활성화. true 로 하면 U턴 후 goal 진입이면 벽이랑 가깝게 들어가서 제자리 회전으로 맞춤. false이면 또 goal에서 oscilation 이 있는듯?
      v_angular_min_in_place: 0.01 #0.03 ## default 2.5

      # 기타 설정 (Miscellaneous)
      transform_tolerance: 0.1          # RPP 값 유지
      allow_backward: false # false             # RPP 값 유지
      use_collision_detection: true # true     # RPP 값 유지,, collision detect 조건이 뭔지? collision_monitor 사용하면 false 해도 될지?
      max_robot_pose_search_dist: 5.0 #default 10 # local_costmap 사이즈정도. but, local costamp 안에 U턴 경로 있을 시 더 낮춰도 됨.






      # # plugin: "nav2_graceful_controller::GracefulController"
      # plugin: "regulated_graceful_controller::GracefulController"

      # # 속도 관련 (Velocity)
      # v_linear_max: 0.75 #0.82    #0.91              # RPP의 desired_linear_vel 값 
      # v_linear_min: 0.01 #0.02               #
      # v_angular_max: 0.91                # default 1.0

      # # '시선' 관련 (Lookahead)
