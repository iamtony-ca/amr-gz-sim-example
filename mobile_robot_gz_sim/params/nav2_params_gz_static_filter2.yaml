collision_monitor:
  ros__parameters:
    # --- 기본 프레임 및 토픽 설정 ---
    base_frame_id: "base_link" #"base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed" # "cmd_vel_input_monitor" #"cmd_vel_smoothed" #"cmd_vel_smoothed" for rpp # "cmd_vel_nav" for graceful 
    cmd_vel_out_topic: "cmd_vel_adjusted" # "cmd_vel_adjusted" for velocity_modifier  #"cmd_vel"
    state_topic: "collision_monitor_state"

    # --- 시간 및 데이터 처리 관련 설정 ---
    transform_tolerance: 0.2
    source_timeout: 0.8                         # 센서 신뢰성
    base_shift_correction: true
    stop_pub_timeout: 1.5 #0.5

    # --- 센서 소스 목록 ---
    observation_sources: ["laser_scan_source", "depth_cloud_source"]

    # --- Polygon(안전 규칙) 목록 ---
    polygons: [
      "dynamic_slowdown",              # Layer 1: 동적 감속
      "dynamic_stop_narrow",           # Layer 2: 동적 정지 (협소 공간 최적화)
      "PolygonSlow",
      "PolygonLimit",
      "PolygonStop"
    ]



    # --- 센서 소스 설정 ---
    laser_scan_source:
      type: "scan"  # "scan"   # "PointCloud2"
      topic: "/scan"  # "/scan"  "/scan_matched_points2"
      enabled: true
    depth_cloud_source:
      type: "pointcloud"  # for future, pointcloud2?
      topic: "/pcl_depth"
      enabled: false
      min_height: 0.10
      max_height: 1.2



    PolygonSlow:
      type: "polygon"
      points: "[[-0.43,0.2],[-0.352,0.33], [0.342,0.33], [0.43,0.21], [0.43,-0.2], [0.352,-0.33], [-0.352,-0.33], [-0.43,-0.2]]"
      action_type: "slowdown"
      min_points: 4  # max_points: 3 for Humble
      slowdown_ratio: 0.85
      visualize: True
      polygon_pub_topic: "polygon_slowdown"
      enabled: true

    PolygonLimit:
      type: "polygon"
      points: "[[-0.4,0.17],[-0.322,0.3], [0.322,0.3], [0.4,0.17], [0.4,-0.17], [0.322,-0.3], [-0.322,-0.3], [-0.4,-0.17]]"
      action_type: "limit"
      min_points: 4  # max_points: 3 for Humble
      linear_limit: 0.3
      angular_limit: 0.4
      visualize: True
      polygon_pub_topic: "polygon_limit"
      enabled: true

    PolygonStop:
      type: "polygon"
      points: "[[0.32, 0.32], [0.32, -0.32], [-0.32, -0.32], [-0.32, 0.32]]"
      action_type: "stop"
      min_points: 3  # max_points: 3 for Humble
      visualize: True
      polygon_pub_topic: "polygon_stop"
      enabled: true


    # ==============================================================================
    # Layer 2: [핵심 방어] 동적 정지 구역 (논리 완결 버전)
    # 역할: 속도에 맞춰 정지 구역의 모양을 바꾸되, 협소 공간 통과에 최적화된
    #       매우 타이트한 안전 마진을 가진 지능적인 비상 정지 시스템.
    # ==============================================================================
    dynamic_stop_narrow:
      enabled: false
      type: "velocity_polygon"
      action_type: "slowdown"
      slowdown_ratio: 0.5
      min_points: 6
      visualize: true
      # 속도 공백을 없애고 3가지 상태(전진, 후진, 저속/회전)로 단순화하여 논리 완결성 확보
      velocity_polygons: ["stop_forward", "stop_backward", "stop_creeping_rotating"]

      # --- 정지: 고속 전진 시 (선속도 > 0.1 m/s) ---
      stop_forward:
        # 단순하고 안정적인 직사각형 형태. 전방으로 20cm 더 김.
        points: "[[0.55, 0.35], [0.55, -0.35], [-0.35, -0.35], [-0.35, 0.35]]"
        linear_min: 0.1
        linear_max: 0.55
        theta_min: -1.0 # 전진 중 회전을 완벽히 커버하기 위해 각속도 범위 최대화
        theta_max: 1.0
      
      # --- 정지: 고속 후진 시 (선속도 < -0.1 m/s) ---
      stop_backward:
        # 단순하고 안정적인 직사각형 형태. 후방으로 20cm 더 김.
        points: "[[0.35, 0.35], [0.35, -0.35], [-0.55, -0.35], [-0.55, 0.35]]"
        linear_min: -0.55
        linear_max: -0.1
        theta_min: -1.0 # 후진 중 회전을 완벽히 커버하기 위해 각속도 범위 최대화
        theta_max: 1.0

      # --- 정지: 저속/정지/회전 시 (선속도 -0.1 ~ 0.1 m/s) ---
      # 제자리 회전, 저속 주행, 정지 상태를 모두 포괄하는 단일 규칙.
      stop_creeping_rotating:
        # footprint + 3cm 마진을 가진 안정적인 8각형. 모든 저속/회전 시나리오에 적용.
        points: "[[-0.38,0.15],[-0.302,0.28], [0.302,0.28], [0.38,0.15], [0.38,-0.15], [0.302,-0.28], [-0.302,-0.28], [-0.38,-0.15]]"
        linear_min: -0.1
        linear_max: 0.1
        theta_min: -1.0
        theta_max: 1.0
        
    # ==============================================================================
    # Layer 1: [외곽 경계] 동적 감속 구역 (논리 완결 버전)
    # 역할: 주행 속도에 맞춰 넓은 감시 구역을 생성하여 조기에 위험을 감지하고
    #       안정성을 높이며 주변에 로봇의 의도를 전달.
    # ==============================================================================
    dynamic_slowdown:
      enabled: false
      type: "velocity_polygon"
      action_type: "slowdown"
      slowdown_ratio: 0.8
      min_points: 10
      visualize: true
      # 속도 공백을 없애고 3가지 상태(전진, 후진, 저속/회전)로 단순화
      velocity_polygons: ["slow_forward", "slow_backward", "slow_creeping_rotating"]

      # --- 감속: 고속 전진 시 (선속도 > 0.25 m/s) ---
      slow_forward:
        # 협소 공간을 고려한 폭(0.9m), 제동거리를 고려한 길이(전방 1.2m)
        points: "[[1.0, 0.40], [1.0, -0.40], [-0.4, -0.40], [-0.4, 0.40]]"
        linear_min: 0.25
        linear_max: 0.55
        theta_min: -1.0 # 각속도 범위 최대화
        theta_max: 1.0

      # --- 감속: 고속 후진 시 (선속도 < -0.25 m/s) ---
      slow_backward:
        # 협소 공간 고려 폭, 제동거리 고려 길이(후방 1.2m)
        points: "[[0.4, 0.40], [0.4, -0.40], [-1.0, -0.40], [-1.0, 0.40]]"
        linear_min: -0.55
        linear_max: -0.3
        theta_min: -1.0 # 각속도 범위 최대화
        theta_max: 1.0

      # --- 감속: 저속/정지/회전 시 (선속도 -0.25 ~ 0.25 m/s) ---
     
      slow_creeping_rotating:
        points: "[[0.5, 0.5], [0.5, -0.5], [-0.5, -0.5], [-0.5, 0.5]]"
        linear_min: -0.25
        linear_max: 0.25
        theta_min: -1.0
        theta_max: 1.0



