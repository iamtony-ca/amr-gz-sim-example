# nav2_params_gz_static_filter.yaml
#
# Gz sim adaptation of the real robot's nav2_params.yaml — the
# TWO-planner + COSTMAP-FILTER variant. Mirrors the real-robot bringup that
# layers a KeepoutFilter on the global_costmap and runs the static planner.
# For the non-filter variant see nav2_params_gz_static.yaml.
#
# Changes from real robot:
#   - Added AMCL section (real robot uses Cartographer SLAM)
#   - bt_navigator: fixed default_nav_to_pose_bt_xml to installed path
#   - local_costmap: replaced hw-specific plugins (ZED/NvBlox/STVL/agent) with VoxelLayer
#   - global_costmap: replaced hw-specific plugins with static_layer + obstacle_layer,
#                     plus lane_filter (KeepoutFilter) reading /costmap_filter_info
#   - collision_monitor: replaced /scan_matched_points2 pointcloud with /f_scan + /b_scan scans
#                        changed cmd_vel_out_topic to "cmd_vel" (no velocity_modifier in sim)
#   - collision_detector: replaced /scan_matched_points2 with /f_scan scan
#   - costmap_filter_info_server / filter_mask_server: use_sim_time True (gz clock)
#   - filter_mask_server.yaml_filename: empty — set by simulation_static_filter.launch.py
#   - All controller/planner/behavior/smoother params kept identical to real robot

amcl:
  ros__parameters:
    # gz sim: alphas 0.1 -> 0.4 (+ update_min 0.05, max_beams 360, more
    # particles). Verified vs the gz pose publisher: mean AMCL pose error
    # 5.6 -> 3.9 cm, and near-zero in well-constrained areas. The remaining
    # ~8 cm in some regions is NOT a tuning fault — the scan-match likelihood
    # basin is very shallow there (an 8 cm pose error costs <1 cm of residual),
    # so the map geometry simply cannot pin the pose tighter. A finer map
    # resolution (0.05 -> 0.025) would be needed to improve it further.
    alpha1: 0.4
    alpha2: 0.4
    alpha3: 0.4
    alpha4: 0.4
    alpha5: 0.1
    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 20.0
    laser_min_range: -1.0
    laser_model_type: "likelihood_field"
    # More beams -> stronger likelihood-field scan matching (the merged /scan
    # has ~2000 points; 60 was too sparse to firmly correct odom rotation drift).
    max_beams: 360
    # Higher particle count keeps the (now wider) cloud dense enough to
    # resolve the scan optimum and smooths the pose mean.
    max_particles: 5000
    min_particles: 2000
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    # gz sim: the simulated lidar is far cleaner than a real SICK scanner, so
    # the measurement model is sharpened — high z_hit / low z_rand / small
    # sigma_hit give a steep likelihood field, so the scan firmly corrects the
    # odometry rotation drift instead of being washed out by the random term.
    sigma_hit: 0.1
    tf_broadcast: true
    transform_tolerance: 1.0
    # Correct often so the scan keeps the estimate pinned to the optimum.
    update_min_a: 0.05
    update_min_d: 0.05
    z_hit: 0.9
    z_max: 0.05
    z_rand: 0.1
    z_short: 0.05
    # Merged 360 deg scan from three_scan_merger_ros2 (f_scan + b_scan).
    # A single 270 deg corner lidar gives AMCL too little coverage and it
    # drifts badly while driving.
    scan_topic: scan
    # gz sim: seed AMCL at the robot spawn pose so it publishes map->odom
    # immediately (no manual RViz 2D Pose Estimate needed); otherwise the
    # costmaps' "map" frame never appears and planner_server fails to activate.
    set_initial_pose: true
    initial_pose:
      x: 5.86
      y: 0.17
      z: 0.0
      yaw: 0.0

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 50
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0

    default_nav_to_pose_bt_xml: "$(find-pkg-share mobile_robot_gz_sim)/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: "$(find-pkg-share amr_bringup)/behavior_trees/moduler23_wo_agent_layer_replan_in_pause_timeout_pub_goals_rmv_goal_in_recovery.xml"
    # default_nav_through_poses_bt_xml: "$(find-pkg-share amr_bringup)/behavior_trees/moduler22_wo_agent_layer_replan_in_pause_timeout_pub_goals_rmv_goal_in_recovery.xml"




    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

    plugin_lib_names:
      - "trigger_planner_decorator"
      - "check_flag_condition"
      - "set_truncated_goal_from_path"
      - "is_path_valid_custom_condition"
      - "prune_passed_path_action"
      - "log_text_action"
      - "path_publisher_action"
      - "trigger_receiver_and_parser"
      - "is_blackboard_changed_condition"
      - "string_publisher_action"
      - "trigger_planner_goals_decorator"
      - "get_next_few_goals_action"
      - "remove_first_goal_action"
      - "replan_guard_decorator"
      - "is_goals_occupied_condition"
      - "subtree_decorator"
      - "error_code_publisher_action"
      - "run_n_times_decorator"
      - "set_blackboard_bool_action"
      - "check_pause_condition"
      - "check_pause_custom_condition"
      - "bool_publisher_action"
      - "set_blackboard_uint16_action"
      - "set_blackboard_ushort_action"
      - "reactive_round_robin_control"
      - "check_pause_reset_condition"
      - "check_safety_plc_condition"
      - "check_final_goal_yaw_action"
      - "get_current_pose_custom_action"
      - "is_goals_occupied_agent_condition"
      - "remove_passed_goal_action"
      - "publish_remaining_goals_action"
      - "compute_validated_path"
      - "progress_aware_round_robin_control"
      - "remove_passed_goals_custom_action"
      - "remove_first_goals_action"

    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    cmd_vel_topic: /cmd_vel
    controller_frequency: 20.0
    costmap_update_timeout: 0.30
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 7.0
    progress_checker_plugins: ["progress_checker", "progress_checker_recovery", "test_checker_recovery"]
    goal_checker_plugins: ["precise_goal_checker", "relaxed_goal_checker", "super_relaxed_goal_checker", "precise_simple_goal_checker"]
    controller_plugins: ["FollowPath", "RecoveryFollowPath1", "RotationGraceful", "ReverseRPP", "StraightRPP"]
    use_realtime_priority: false

    precise_goal_checker:
      plugin: "nav2_controller::StableStoppedGoalChecker"
      x_goal_tolerance: 0.045
      y_goal_tolerance: 0.045
      yaw_goal_tolerance: 0.04
      trans_stopped_velocity: 0.0
      rot_stopped_velocity: 0.0
      xy_stability_duration: 0.01
      yaw_stability_duration: 0.5
      stateful: true

    progress_checker:
      plugin: "amr_controller::ProgressPublisherChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 25.0

    progress_checker_recovery:
      plugin: "amr_controller::ProgressPublisherChecker"
      required_movement_radius: 0.2
      movement_time_allowance: 15.0

    test_checker_recovery:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 10.0

    precise_simple_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 0.04
      stateful: true

    relaxed_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 0.8
      stateful: false

    super_relaxed_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.8
      stateful: false

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "advanced_graceful_controller::GracefulController"
      v_linear_max: 0.71
      v_linear_min: 0.01
      v_angular_max: 1.8
      min_lookahead: 0.45
      max_lookahead: 1.05
      k_phi: 1.0
      k_delta: 1.5
      beta: 0.75
      lambda: 1.5
      slowdown_radius: 1.2
      initial_rotation: false
      initial_rotation_tolerance: 1.5
      prefer_final_rotation: false
      v_angular_min_in_place: 0.01
      transform_tolerance: 0.1
      allow_backward: false
      use_collision_detection: true
      max_robot_pose_search_dist: 5.0

    ReverseRPP:
      plugin: "advanced_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.35
      use_velocity_scaled_lookahead_dist: false
      lookahead_dist: 0.5
      min_lookahead_dist: 0.6
      max_lookahead_dist: 0.9
      lookahead_time: 2.5
      allow_reversing: true
      use_rotate_to_heading: true
      rotate_to_heading_angular_vel: 0.3
      rotate_to_heading_min_angle: 1.5
      max_angular_accel: 0.2
      transform_tolerance: 0.1
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.5
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 1.5
      regulated_linear_scaling_min_speed: 0.05
      use_fixed_curvature_lookahead: true
      curvature_lookahead_dist: 0.5
      interpolate_curvature_after_goal: false
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.4
      cost_scaling_gain: 0.4
      max_robot_pose_search_dist: 5.0

    RecoveryFollowPath1:
      plugin: "regulated_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4
      vx_max: 0.5
      vx_min: -0.35
      vy_max: 0.5
      wz_max: 1.9
      ax_max: 2.0
      ax_min: -3.0
      ay_min: -3.0
      ay_max: 2.0
      az_max: 2.5
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: false
      reset_period: 1.0
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      PathHandler:
        max_robot_pose_search_dist: 3.0
        prune_distance: 1.1
        transform_tolerance: 0.1
        enforce_path_inversion: true
        inversion_xy_tolerance: 0.05
        inversion_yaw_tolerance: 0.06
      AckermannConstraints:
        min_turning_r: 0.35
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.2
      PreferForwardCritic:
        enabled: false
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 35.0
        deadband_velocities: [0.02, 0.0, 0.01]

    RotationGraceful:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_graceful_controller::GracefulController"
      angular_dist_threshold: 0.4
      angular_disengage_threshold: 0.35
      forward_sampling_distance: 0.3
      rotate_to_heading_angular_vel: 0.5
      max_angular_accel: 5.0
      simulate_ahead_time: 3.0
      rotate_to_goal_heading: false
      rotate_to_heading_once: true
      closed_loop: true
      use_path_orientations: false
      v_linear_max: 0.55
      v_linear_min: 0.02
      v_angular_max: 1.0
      min_lookahead: 0.60
      max_lookahead: 1.0
      k_phi: 1.0
      k_delta: 0.8
      beta: 0.25
      lambda: 1.5
      slowdown_radius: 1.0
      initial_rotation: false
      initial_rotation_tolerance: 1.5
      prefer_final_rotation: false
      v_angular_min_in_place: 0.03
      transform_tolerance: 0.1
      allow_backward: false
      use_collision_detection: true
      max_robot_pose_search_dist: 5.0

    StraightRPP:
      plugin: "straight_pure_pursuit_controller::StraightPurePursuitController"
      desired_linear_vel: 0.3
      use_velocity_scaled_lookahead_dist: true
      lookahead_dist: 0.6
      min_lookahead_dist: 0.65
      max_lookahead_dist: 0.9
      lookahead_time: 2.5
      allow_reversing: true
      use_rotate_to_heading: true
      rotate_to_heading_angular_vel: 0.3
      rotate_to_heading_min_angle: 1.5
      max_angular_accel: 0.2
      transform_tolerance: 0.1
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: false
      max_allowed_time_to_collision_up_to_carrot: 0.01
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 2.0
      regulated_linear_scaling_min_speed: 0.2
      use_fixed_curvature_lookahead: true
      curvature_lookahead_dist: 0.6
      interpolate_curvature_after_goal: false
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.55
      cost_scaling_gain: 0.4
      max_robot_pose_search_dist: 5.0
      stateful: true

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased", "RecoveryGridBased1", "RecoveryGridBased2", "ReverseReedsShepp", "StraightLine"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"
      downsample_costmap: false
      downsampling_factor: 1
      tolerance: 0.01
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 144
      analytic_expansion_ratio: 1.2
      analytic_expansion_max_length: 1.5
      analytic_expansion_max_cost: 254.0
      analytic_expansion_max_cost_override: true
      minimum_turning_radius: 0.3
      reverse_penalty: 2.0
      change_penalty: 0.0
      non_straight_penalty: 2.5
      cost_penalty: 0.7
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      debug_visualizations: false
      use_quadratic_cost_penalty: true
      downsample_obstacle_heuristic: True
      allow_primitive_interpolation: False
      coarse_search_resolution: 4
      goal_heading_mode: "DEFAULT"
      smooth_path: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.25
        w_data: 0.9
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2

    ReverseReedsShepp:
      plugin: "reverse_smac_planner::SmacPlannerHybrid"
      downsample_costmap: false
      downsampling_factor: 1
      tolerance: 0.01
      allow_unknown: true
      max_iterations: 100000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 72
      analytic_expansion_ratio: 1.2
      analytic_expansion_max_length: 1.5
      analytic_expansion_max_cost: 254.0
      analytic_expansion_max_cost_override: true
      minimum_turning_radius: 0.3
      reverse_penalty: 1.0
      change_penalty: 50.0
      non_straight_penalty: 1.5
      cost_penalty: 0.7
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      debug_visualizations: true
      use_quadratic_cost_penalty: true
      downsample_obstacle_heuristic: True
      allow_primitive_interpolation: False
      coarse_search_resolution: 4
      goal_heading_mode: "DEFAULT"
      smooth_path: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.8
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2

    RecoveryGridBased1:
      plugin: "amr_smac_planner::SmacPlannerHybrid"
      downsample_costmap: false
      downsampling_factor: 2
      tolerance: 0.25
      allow_unknown: false
      max_iterations: 100000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "REEDS_SHEPP"
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.0
      analytic_expansion_max_length: 3.0
      analytic_expansion_max_cost: 254.0
      analytic_expansion_max_cost_override: true
      minimum_turning_radius: 0.3
      reverse_penalty: 1.0
      change_penalty: 0.0
      non_straight_penalty: 1.3
      cost_penalty: 5.5
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      debug_visualizations: false
      use_quadratic_cost_penalty: False
      downsample_obstacle_heuristic: True
      allow_primitive_interpolation: False
      coarse_search_resolution: 4
      goal_heading_mode: "DEFAULT"
      smooth_path: True
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2

    RecoveryGridBased2:
      plugin: "ammr_navfn_planner::NavfnPlanner"
      tolerance: 0.01
      use_astar: true
      allow_unknown: true
      use_final_approach_orientation: false

    StraightLine:
      plugin: "ammr_straightline_planner::StraightLine"
      interpolation_resolution: 0.1

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      transform_tolerance: 0.7
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.05
      footprint: "[[0.32, 0.315], [0.32, -0.315], [-0.315, -0.315], [-0.315, 0.315]]"
      footprint_padding: 0.02
      always_send_full_costmap: True
      plugins: ['voxel_layer', 'inflation_layer']
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: True
        cost_scaling_factor: 10.0
        inflation_radius: 0.61
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: f_scan b_scan
        f_scan:
          topic: /f_scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.5
          obstacle_min_range: 0.0
        b_scan:
          topic: /b_scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.5
          obstacle_min_range: 0.0

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      transform_tolerance: 0.5
      global_frame: map
      robot_base_frame: base_link
      footprint: "[[0.32, 0.315], [0.32, -0.315], [-0.315, -0.315], [-0.315, 0.315]]"
      footprint_padding: 0.02
      rolling_window: false
      width: 100
      height: 50
      resolution: 0.05
      track_unknown_space: false
      always_send_full_costmap: True
      plugins: ['static_layer', 'lane_filter', 'obstacle_layer', 'inflation_layer']
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_subscribe_transient_local: True
      lane_filter:
        # Matches the real robot's naming (`lane_filter` in nav2_params.yaml).
        # Subscribes to /costmap_filter_info published by costmap_filter_info_server.
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/costmap_filter_info"
        tranform_tolerance: 0.5
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: f_scan b_scan
        f_scan:
          topic: /f_scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.5
          obstacle_min_range: 0.0
        b_scan:
          topic: /b_scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: True
        cost_scaling_factor: 10.0
        inflation_radius: 0.61

map_server:
  ros__parameters:
    yaml_filename: "$(find-pkg-share mobile_robot_gz_sim)/maps/depot.yaml"

map_saver:
  ros__parameters:
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-11
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 1.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.5
    simulate_ahead_time: 3.0
    max_rotational_vel: 0.2
    min_rotational_vel: 0.006
    rotational_acc_lim: 0.007

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 0

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    enable_stamped_cmd_vel: false
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [1.0, 0.0, 2.0]
    min_velocity: [-0.6, 0.0, -1.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    bond_heartbeat_period: 0.1

collision_monitor:
  ros__parameters:
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 2.0
    base_shift_correction: true
    stop_pub_timeout: 1.5
    observation_sources: ["f_scan_source", "b_scan_source"]
    polygons: ["PolygonSlow", "PolygonLimit", "PolygonStop"]

    f_scan_source:
      type: "scan"
      topic: "/f_scan"
      min_height: 0.05
      max_height: 2.0
      enabled: true
    b_scan_source:
      type: "scan"
      topic: "/b_scan"
      min_height: 0.05
      max_height: 2.0
      enabled: true

    PolygonSlow:
      type: "polygon"
      points: "[[-0.43,0.2],[-0.352,0.33], [0.342,0.33], [0.43,0.21], [0.43,-0.2], [0.352,-0.33], [-0.352,-0.33], [-0.43,-0.2]]"
      action_type: "slowdown"
      min_points: 4
      slowdown_ratio: 0.85
      visualize: True
      polygon_pub_topic: "polygon_slowdown"
      enabled: true

    PolygonLimit:
      type: "polygon"
      points: "[[-0.4,0.17],[-0.322,0.3], [0.322,0.3], [0.4,0.17], [0.4,-0.17], [0.322,-0.3], [-0.322,-0.3], [-0.4,-0.17]]"
      action_type: "limit"
      min_points: 4
      linear_limit: 0.3
      angular_limit: 0.4
      visualize: True
      polygon_pub_topic: "polygon_limit"
      enabled: true

    PolygonStop:
      type: "polygon"
      points: "[[0.32, 0.32], [0.32, -0.32], [-0.32, -0.32], [-0.32, 0.32]]"
      action_type: "stop"
      min_points: 3
      visualize: True
      polygon_pub_topic: "polygon_stop"
      enabled: true

collision_detector:
  ros__parameters:
    frequency: 10.0
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    transform_tolerance: 0.5
    source_timeout: 5.0
    base_shift_correction: True
    polygons: ["PolygonSafety"]
    PolygonSafety:
      type: "polygon"
      points: "[[0.52, 0.32], [0.52, -0.32], [-0.35, -0.32], [-0.35, 0.32]]"
      action_type: "none"
      min_points: 4
      visualize: True
      polygon_pub_topic: "polygon_safety"
      enabled: True
    observation_sources: ["f_scan_det"]
    f_scan_det:
      type: "scan"
      topic: "/f_scan"
      enabled: True

docking_server:
  ros__parameters:
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true
      use_battery_status: false
      use_stall_detection: false
      external_detection_timeout: 1.0
      external_detection_translation_x: -0.18
      external_detection_translation_y: 0.0
      external_detection_rotation_roll: -1.57
      external_detection_rotation_pitch: -1.57
      external_detection_rotation_yaw: 0.0
      filter_coef: 0.1
    controller:
      k_phi: 3.0
      k_delta: 2.0
      v_linear_min: 0.15
      v_linear_max: 0.15
      use_collision_detection: true
      costmap_topic: "/local_costmap/costmap_raw"
      footprint_topic: "/local_costmap/published_footprint"
      transform_tolerance: 0.1
      projection_time: 5.0
      simulation_step: 0.1
      dock_collision_threshold: 0.3

# ============================================================================
# static_planner_server  —  the real robot's SECOND planner_server.
# amr_bringup/navigation_launch.py runs two planner_servers; this one plans on
# the static map only (static_layer + inflation_layer, no obstacle/agent
# layers), giving a reference path that ignores dynamic obstacles. It runs in
# the `static_nav` namespace and is brought up by navigation_launch_gz_static.py.
# Params copied verbatim from the real robot's nav2_params.yaml `static_nav:`.
# ============================================================================
static_nav:
  static_planner_server:
    ros__parameters:
      expected_planner_frequency: 20.0
      planner_plugins: ["StaticGridBased"]

      StaticGridBased:
        plugin: "amr_smac_planner::SmacPlannerHybrid"
        downsample_costmap: false
        downsampling_factor: 1
        tolerance: 0.01
        allow_unknown: true
        max_iterations: 1000000
        max_on_approach_iterations: 1000
        max_planning_time: 5.0
        motion_model_for_search: "DUBIN"
        angle_quantization_bins: 144
        analytic_expansion_ratio: 1.2
        analytic_expansion_max_length: 1.5
        analytic_expansion_max_cost: 254.0
        analytic_expansion_max_cost_override: true
        minimum_turning_radius: 0.3
        reverse_penalty: 2.0
        change_penalty: 0.0
        non_straight_penalty: 2.5
        cost_penalty: 0.7
        retrospective_penalty: 0.015
        lookup_table_size: 20.0
        cache_obstacle_heuristic: false
        debug_visualizations: false
        use_quadratic_cost_penalty: true
        downsample_obstacle_heuristic: True
        allow_primitive_interpolation: False
        coarse_search_resolution: 4
        goal_heading_mode: "DEFAULT"
        smooth_path: true
        smoother:
          max_iterations: 1000
          w_smooth: 0.25
          w_data: 0.9
          tolerance: 1.0e-10
          do_refinement: true
          refinement_num: 2

  global_costmap:
    global_costmap:
      ros__parameters:
        update_frequency: 1.0
        publish_frequency: 1.0
        global_frame: map
        robot_base_frame: base_link
        resolution: 0.05
        track_unknown_space: false
        always_send_full_costmap: True
        rolling_window: false
        width: 100
        height: 50
        footprint: "[[0.32, 0.315], [0.32, -0.315], [-0.315, -0.315], [-0.315, 0.315]]"
        footprint_padding: 0.02
        # Static path only: static_layer + inflation_layer, no sensor layers.
        plugins: ['static_layer', 'inflation_layer']
        static_layer:
          plugin: "nav2_costmap_2d::StaticLayer"
          map_subscribe_transient_local: True
          map_topic: "/map"
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          enabled: True
          cost_scaling_factor: 10.0
          inflation_radius: 0.61


# =====================================================================
# Costmap Filter servers — mirrors real-robot nav2_params.yaml bottom block.
# `yaml_filename` is left blank; run_simulation_static_filter.launch.py
# rewrites it from the `filter_mask_file` arg (or simulation_static_filter
# passes it through to costmap_filter.launch.py's RewrittenYaml).
# =====================================================================
costmap_filter_info_server:
  ros__parameters:
    use_sim_time: true
    type: 0                       # 0: Keepout, 1: Weighted
    filter_info_topic: "/costmap_filter_info"
    mask_topic: "/median_filter_mask"
    base: 0.0
    multiplier: 1.0

filter_mask_server:
  ros__parameters:
    use_sim_time: true
    frame_id: "map"
    topic_name: "/median_filter_mask"
    yaml_filename: ""
