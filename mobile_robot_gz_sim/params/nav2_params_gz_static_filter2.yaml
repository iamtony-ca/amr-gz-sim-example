      # k_phi: 1.4 #1.3 #1.2 # 1.0 # 1.2 # 1.0 #2.0                        # 위치와 방향의 균형을 맞추는 값, waypoint/pose follow할지 trade-off, 낮으면 waypoint following. / 테스트 해보면, 값이 크면 곡선에서 global path arc 보다 크게 돔.
      # k_delta: 1.0 #1.2 #1.5 #0.8 #0.7 #0.8 #1.0                       # 조향 민감도에 대한 default 1.0, local_plan(파랑 경로) 벗어났을때 얼마나 빠르게 경로로 복귀하려고 하는지 정도. / 테스트 결과, 값이 크면, 곡선을 훨씬 잘 따라감. 하지만, 직진 코스에서 약간 wabble 거림.

      # # 곡선 주행 (Curve Handling) - RPP의 regulated_linear_velocity_scaling 대체
      # beta: 1.0 #0.8 #0.75 #0.55 #0.25 #0.2 #default 0.4                         # 곡선에서 속도를 줄이는 민감도 / 테스트결과: 곡선구간에서 순간적인 감속+저속주행
      # lambda: 1.0 #1.5 #2.0 #1.15 #1.2 #1.7 # 1.6 #1.7 #default 2.0                       # 곡선을 얼마나 날카롭게 돌지 결정. 값이 작으면 global path보다 더 큰 호를 그림. / 테스트 결과, 값이 작으면, 곡선에서 더 빠르게 돌려고 함.+ global path보다 더 큰 호를 그림. 값이 크면, 곡선에서 더 느리게 돌려고함 + 직진성이 더 좋아진 느낌(?)

      # # 목표 지점 동작 (Goal Behavior)
      # slowdown_radius: 1.0                  # RPP의 approach_velocity_scaling_dist 값 유지
      # initial_rotation: false #true            # RPP의 use_rotate_to_heading 설정 유지
      # initial_rotation_tolerance: 1.5 #1.5   # RPP의 rotate_to_heading_min_angle 값 유지
      # prefer_final_rotation: false #false #true       # 최종 목표 지점에서 부드러운 정렬을 위해 활성화. true 로 하면 U턴 후 goal 진입이면 벽이랑 가깝게 들어가서 제자리 회전으로 맞춤. false이면 또 goal에서 oscilation 이 있는듯?
